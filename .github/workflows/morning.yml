name: Morning Signal PRO

on:
  schedule:
    - cron: "30 1 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Morning Signal Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          UNIVERSE_FILE: ${{ vars.UNIVERSE_FILE }}
          YF_PERIOD: ${{ vars.YF_PERIOD }}
          YF_INTERVAL: ${{ vars.YF_INTERVAL }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE }}
          BATCH_SLEEP_SECONDS: ${{ vars.BATCH_SLEEP_SECONDS }}
          MAX_TOP_GLOBAL: ${{ vars.MAX_TOP_GLOBAL }}
          MAX_PER_CATEGORY: ${{ vars.MAX_PER_CATEGORY }}
          MIN_ROWS: ${{ vars.MIN_ROWS }}
          MESSAGE_LIMIT: ${{ vars.MESSAGE_LIMIT }}
          ENABLE_AI: ${{ vars.ENABLE_AI }}
          AI_MAX_COUNT: ${{ vars.AI_MAX_COUNT }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          SEND_CSV_REPORT: ${{ vars.SEND_CSV_REPORT }}
        run: python main.py