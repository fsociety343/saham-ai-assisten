name: Morning Signal PRO

on:
  schedule:
    - cron: "0 9,12,15 * * 1-5"
      timezone: "Asia/Jakarta"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Morning Signal Bot
        env:
          # Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          # Config with fallback default
          UNIVERSE_FILE: ${{ vars.UNIVERSE_FILE || 'data/syariah_universe.csv' }}
          YF_PERIOD: ${{ vars.YF_PERIOD || '6mo' }}
          YF_INTERVAL: ${{ vars.YF_INTERVAL || '1d' }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE || '25' }}
          BATCH_SLEEP_SECONDS: ${{ vars.BATCH_SLEEP_SECONDS || '1' }}
          MAX_TOP_GLOBAL: ${{ vars.MAX_TOP_GLOBAL || '20' }}
          MAX_PER_CATEGORY: ${{ vars.MAX_PER_CATEGORY || '5' }}
          MIN_ROWS: ${{ vars.MIN_ROWS || '40' }}
          MESSAGE_LIMIT: ${{ vars.MESSAGE_LIMIT || '3900' }}
          ENABLE_AI: ${{ vars.ENABLE_AI || 'true' }}
          AI_MAX_COUNT: ${{ vars.AI_MAX_COUNT || '5' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          SEND_CSV_REPORT: ${{ vars.SEND_CSV_REPORT || 'false' }}
        run: python main.py